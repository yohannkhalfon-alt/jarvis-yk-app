name: pages
# Hébergement de secours gratuit de l'app MAJ VAC sur GitHub Pages
# (utilisé quand le site Netlify est suspendu — l'app bascule alors
# automatiquement sur les données publiées dans vac/data.json).
# Publie la branche gh-pages : l'activation de Pages via l'API n'est pas
# permise au jeton du workflow, la branche gh-pages s'active d'elle-même.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "vac/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publier vac/ sur la branche gh-pages
        run: |
          mkdir -p _site
          cp -r vac _site/vac
          printf '<!DOCTYPE html><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=vac/"><a href="vac/">MAJ VAC</a>' > _site/index.html
          touch _site/.nojekyll
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publication MAJ VAC ($GITHUB_SHA)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
