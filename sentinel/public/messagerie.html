<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JARVIS·YK — Messagerie</title>
<style>
  :root { --bg:#0b141a; --panel:#111b21; --panel2:#202c33; --acc:#00a884; --txt:#e9edef; --dim:#8696a0; --in:#005c4b; --out:#202c33; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); height:100vh; overflow:hidden; }
  #login { display:flex; height:100vh; align-items:center; justify-content:center; flex-direction:column; gap:14px; padding:20px; text-align:center; }
  #login h1 { font-size:22px; font-weight:600; }
  #login p { color:var(--dim); max-width:360px; font-size:14px; }
  input { background:var(--panel2); border:1px solid #2a3942; color:var(--txt); padding:12px 14px; border-radius:10px; font-size:15px; outline:none; width:280px; }
  button { background:var(--acc); color:#04231c; border:0; padding:12px 18px; border-radius:10px; font-weight:600; cursor:pointer; font-size:15px; }
  #app { display:none; grid-template-columns:340px 1fr; height:100vh; }
  #side { background:var(--panel); border-right:1px solid #222d34; display:flex; flex-direction:column; }
  #top { padding:12px 14px; background:var(--panel2); display:flex; gap:10px; align-items:center; }
  #top select { background:var(--panel); color:var(--txt); border:1px solid #2a3942; border-radius:8px; padding:6px; }
  #search { flex:1; }
  #search input { width:100%; padding:8px 12px; font-size:14px; }
  #chats { overflow-y:auto; flex:1; }
  .chat { padding:11px 14px; border-bottom:1px solid #182229; cursor:pointer; display:flex; flex-direction:column; gap:3px; }
  .chat:hover { background:var(--panel2); }
  .chat.active { background:var(--panel2); }
  .chat .r1 { display:flex; justify-content:space-between; gap:8px; }
  .chat .nm { font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat .ts { color:var(--dim); font-size:11px; flex-shrink:0; }
  .chat .pv { color:var(--dim); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .badge { font-size:10px; color:var(--acc); }
  #main { display:flex; flex-direction:column; background:#0b141a; background-image:linear-gradient(rgba(11,20,26,.95),rgba(11,20,26,.95)); }
  #head { padding:14px 18px; background:var(--panel2); font-weight:600; border-bottom:1px solid #222d34; }
  #msgs { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:6px; }
  .m { max-width:70%; padding:7px 11px; border-radius:9px; font-size:14px; line-height:1.35; white-space:pre-wrap; word-break:break-word; }
  .m.me { align-self:flex-end; background:var(--in); }
  .m.them { align-self:flex-start; background:var(--out); }
  .m .who { font-size:12px; color:var(--acc); font-weight:600; margin-bottom:2px; }
  .m .t { font-size:10px; color:var(--dim); text-align:right; margin-top:3px; }
  .empty { color:var(--dim); text-align:center; margin-top:40px; }
  .day { align-self:center; background:var(--panel2); color:var(--dim); font-size:11px; padding:4px 10px; border-radius:8px; margin:8px 0; }
  .err { color:#f0a; font-size:13px; }
</style>
</head>
<body>
<div id="login">
  <h1>🛰️ JARVIS·YK — Messagerie</h1>
  <p>Interface de lecture des conversations surveillées. Accès protégé par jeton.</p>
  <input id="tok" type="password" placeholder="Jeton d'accès" autocomplete="off">
  <button onclick="login()">Entrer</button>
  <p id="lerr" class="err"></p>
</div>

<div id="app">
  <div id="side">
    <div id="top">
      <select id="acc" onchange="loadChats()"></select>
      <div id="search"><input id="q" placeholder="Rechercher…" oninput="onSearch()"></div>
    </div>
    <div id="chats"></div>
  </div>
  <div id="main">
    <div id="head">Sélectionne une conversation</div>
    <div id="msgs"><div class="empty">Aucune conversation ouverte.</div></div>
  </div>
</div>

<script>
let TOK = localStorage.getItem("sentinel_tok") || "";
let ACC = "";
let CUR = null;
const $ = (s) => document.querySelector(s);

async function api(path, params = {}) {
  const u = new URL(path, location.origin);
  u.searchParams.set("token", TOK);
  if (ACC) u.searchParams.set("account", ACC);
  for (const [k, v] of Object.entries(params)) u.searchParams.set(k, v);
  const r = await fetch(u);
  if (r.status === 401) throw new Error("401");
  return r.json();
}

function login() {
  TOK = $("#tok").value.trim();
  if (!TOK) return;
  localStorage.setItem("sentinel_tok", TOK);
  start();
}

async function start() {
  try {
    const accs = await api("/api/accounts");
    $("#login").style.display = "none";
    $("#app").style.display = "grid";
    const sel = $("#acc");
    sel.innerHTML = accs.map((a) => `<option value="${a.id}">${a.id}${a.connected ? " 🟢" : " 🔴"}</option>`).join("");
    ACC = accs[0]?.id || "";
    if (accs.length < 2) sel.style.display = "none";
    loadChats();
  } catch (e) {
    $("#lerr").textContent = e.message === "401" ? "Jeton invalide." : "Erreur de connexion au serveur.";
    localStorage.removeItem("sentinel_tok");
  }
}

const fmtTs = (ts) => new Date(ts).toLocaleString("fr-FR", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
const fmtDay = (ts) => new Date(ts).toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long" });

async function loadChats() {
  ACC = $("#acc").value;
  const chats = await api("/api/chats");
  const el = $("#chats");
  if (!chats.length) { el.innerHTML = `<div class="empty">Aucun message archivé pour l'instant.<br>Le serveur importe l'historique dès la liaison.</div>`; return; }
  el.innerHTML = chats.map((c) => `
    <div class="chat" data-jid="${encodeURIComponent(c.jid)}" data-name="${escapeAttr(c.name)}" onclick="openChat(this)">
      <div class="r1"><span class="nm">${c.isGroup ? "👥 " : ""}${escapeHtml(c.name)}</span><span class="ts">${c.lastTs ? fmtTs(c.lastTs) : ""}</span></div>
      <div class="pv">${escapeHtml((c.lastSender ? c.lastSender + ": " : "") + (c.lastText || ""))}</div>
      <div class="badge">${c.count} msg</div>
    </div>`).join("");
}

async function openChat(node) {
  document.querySelectorAll(".chat").forEach((n) => n.classList.remove("active"));
  node.classList.add("active");
  const jid = decodeURIComponent(node.dataset.jid);
  CUR = jid;
  $("#head").textContent = node.dataset.name;
  const msgs = await api("/api/messages", { jid });
  renderMsgs(msgs, false);
}

function renderMsgs(msgs, isSearch) {
  const box = $("#msgs");
  if (!msgs.length) { box.innerHTML = `<div class="empty">Rien à afficher.</div>`; return; }
  let html = "", lastDay = "";
  for (const m of msgs) {
    const day = fmtDay(m.ts);
    if (!isSearch && day !== lastDay) { html += `<div class="day">${day}</div>`; lastDay = day; }
    const who = isSearch ? `<div class="who">${escapeHtml(m.chatName || "")} · ${escapeHtml(m.fromMe ? "moi" : m.sender)}</div>`
                         : (m.fromMe ? "" : `<div class="who">${escapeHtml(m.sender)}</div>`);
    html += `<div class="m ${m.fromMe ? "me" : "them"}">${who}${escapeHtml(m.text)}<div class="t">${fmtTs(m.ts)}</div></div>`;
  }
  box.innerHTML = html;
  if (!isSearch) box.scrollTop = box.scrollHeight;
}

let searchTimer;
function onSearch() {
  clearTimeout(searchTimer);
  const q = $("#q").value.trim();
  searchTimer = setTimeout(async () => {
    if (q.length < 2) { if (CUR) openChatByJid(CUR); return; }
    const hits = await api("/api/search", { q });
    $("#head").textContent = `Recherche : « ${q} » (${hits.length})`;
    renderMsgs(hits, true);
  }, 300);
}
function openChatByJid(jid) {
  const n = document.querySelector(`.chat[data-jid="${encodeURIComponent(jid)}"]`);
  if (n) openChat(n);
}

function escapeHtml(s) { return String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/'/g, "&#39;"); }

// Auto-refresh de la liste des conversations
setInterval(() => { if ($("#app").style.display === "grid" && !$("#q").value.trim()) loadChats(); }, 20000);

if (TOK) start();
</script>
</body>
</html>
