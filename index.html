<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#04060C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>JARVIS·YK — Direction Virtuelle</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  :root {
    --bg: #04060C; --panel: rgba(10,16,28,0.72); --line: rgba(79,216,235,0.18);
    --blue: #1B6FD8; --cyan: #4FD8EB; --txt: #C8D6E5; --dim: #6B7C93;
  }
  body {
    background: var(--bg); color: var(--txt);
    font-family: 'Rajdhani', sans-serif;
    display: flex; flex-direction: column; min-height: 100vh; overflow: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(27,111,216,0.13), transparent),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(79,216,235,0.06), transparent);
  }
  @keyframes spin { from { transform: rotate(0);} to { transform: rotate(360deg);} }
  @keyframes pulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  header {
    display:flex; align-items:center; gap:14px; padding:14px 20px;
    border-bottom:1px solid var(--line); background:rgba(4,6,12,.6); backdrop-filter:blur(8px);
  }
  .core { width:34px; height:34px; position:relative; flex:none; }
  .core::before, .core::after {
    content:''; position:absolute; inset:0; border-radius:50%;
    border:2px solid transparent; border-top-color:var(--cyan); border-right-color:var(--blue);
    animation:spin 3s linear infinite;
  }
  .core::after { inset:6px; border-top-color:var(--blue); border-right-color:var(--cyan); animation-direction:reverse; animation-duration:2s; }
  h1 { font-family:'Orbitron'; font-size:18px; letter-spacing:3px; color:#EAF4FF; font-weight:700; }
  h1 span { color:var(--cyan); }
  .sub { font-size:11px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; }
  .status { margin-left:auto; font-size:11px; color:var(--dim); letter-spacing:1px; display:flex; align-items:center; gap:6px; }
  .dot { width:7px; height:7px; border-radius:50%; background:#33d17a; animation:pulse 2s infinite; }

  .main { flex:1; display:flex; min-height:0; }
  .agents {
    width:240px; flex:none; border-right:1px solid var(--line); overflow-y:auto; padding:12px;
    background:rgba(4,6,12,.4);
  }
  .agents h2 { font-size:10px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; padding:6px 8px 10px; }
  .agent {
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; cursor:pointer;
    border:1px solid transparent; margin-bottom:4px; transition:.15s;
  }
  .agent:hover { background:rgba(79,216,235,.06); }
  .agent.active { background:rgba(27,111,216,.14); border-color:var(--line); }
  .av { width:30px; height:30px; border-radius:8px; flex:none; display:flex; align-items:center; justify-content:center; font-family:'Orbitron'; font-weight:700; font-size:13px; color:#04060C; }
  .agent .nm { font-weight:600; font-size:14px; color:#EAF4FF; }
  .agent .rl { font-size:11px; color:var(--dim); }

  .chat { flex:1; display:flex; flex-direction:column; min-width:0; }
  .feed { flex:1; overflow-y:auto; padding:22px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width:78%; animation:fadeUp .25s ease; }
  .msg.user { align-self:flex-end; }
  .bubble { padding:12px 15px; border-radius:14px; font-size:15px; line-height:1.5; white-space:pre-wrap; }
  .msg.user .bubble { background:linear-gradient(135deg,var(--blue),#0d4ea0); color:#fff; border-bottom-right-radius:4px; }
  .msg.ai .bubble { background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .who { font-size:11px; color:var(--cyan); letter-spacing:1px; margin-bottom:5px; font-weight:600; text-transform:uppercase; }
  .empty { margin:auto; text-align:center; color:var(--dim); }
  .empty .core { width:64px; height:64px; margin:0 auto 18px; }
  .empty p { font-size:15px; max-width:380px; line-height:1.6; }

  .composer { border-top:1px solid var(--line); padding:14px 18px; display:flex; gap:10px; align-items:flex-end; background:rgba(4,6,12,.6); }
  textarea {
    flex:1; resize:none; background:var(--panel); border:1px solid var(--line); border-radius:12px;
    color:var(--txt); font-family:inherit; font-size:15px; padding:12px 14px; max-height:120px; outline:none;
  }
  textarea:focus { border-color:var(--cyan); }
  button.icon {
    width:46px; height:46px; flex:none; border-radius:12px; border:1px solid var(--line); cursor:pointer;
    background:var(--panel); color:var(--cyan); font-size:20px; display:flex; align-items:center; justify-content:center; transition:.15s;
  }
  button.icon:hover { background:rgba(79,216,235,.1); }
  button.icon.rec { background:#d1303a; color:#fff; border-color:#d1303a; animation:pulse 1.2s infinite; }
  button.send { background:linear-gradient(135deg,var(--blue),var(--cyan)); color:#04060C; font-weight:700; }
  button:disabled { opacity:.4; cursor:not-allowed; }

  @media (max-width:760px){
    .agents { position:fixed; left:0; top:0; bottom:0; z-index:20; transform:translateX(-100%); transition:.25s; box-shadow:0 0 40px #000; }
    .agents.open { transform:translateX(0); }
    .burger { display:flex !important; }
    .msg { max-width:90%; }
  }
  .burger { display:none; width:34px; height:34px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--cyan); align-items:center; justify-content:center; cursor:pointer; font-size:18px; }
</style>
</head>
<body>
  <header>
    <button class="burger" onclick="document.getElementById('agents').classList.toggle('open')">☰</button>
    <div class="core"></div>
    <div>
      <h1>JARVIS<span>·</span>YK</h1>
      <div class="sub">Direction Virtuelle</div>
    </div>
    <div class="status"><span class="dot"></span> <span id="statusTxt">EN LIGNE</span></div>
  </header>

  <div class="main">
    <aside class="agents" id="agents">
      <h2>Équipe</h2>
      <div id="agentList"></div>
    </aside>

    <section class="chat">
      <div class="feed" id="feed">
        <div class="empty" id="empty">
          <div class="core"></div>
          <p>Sélectionne un membre de ta direction à gauche, puis parle ou écris. ARIA pilote, les autres exécutent.</p>
        </div>
      </div>
      <div class="composer">
        <button class="icon" id="micBtn" title="Micro" onclick="toggleMic()">🎙</button>
        <textarea id="input" rows="1" placeholder="Parle à ton équipe…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
        <button class="icon send" id="sendBtn" title="Envoyer" onclick="send()">➤</button>
      </div>
    </section>
  </div>

<script>
const AGENTS = [
  { id:"aria", name:"ARIA", role:"Chef de Direction", color:"#4FD8EB", voiceId:"XB0fDUnXU5powFXDhCwa",
    sys:"Tu es ARIA, Chef de Direction (COO/CEO) de Yohann Kha, fondateur d'un groupe de centres d'ophtalmologie en France (objectif : revente 50-100M€ sous 5-10 ans). Tu analyses, tu décides, tu délègues nominativement aux autres membres (Renaud=juridique, Vidal=médical, Sofia=marketing, Marcus=finance, Kenzo=tech, Bernard=immobilier, Yasmine=import-export, Luna=mental, NEO=futuro, Le Colonel=critique). Zéro blabla, zéro remplissage. Toujours : priorité d'action, impact financier, difficulté, plan concret avec responsable et échéance. Tu challenges les idées faibles et identifies les goulots d'étranglement." },
  { id:"renaud", name:"Mtre Renaud", role:"Droit santé & travail", color:"#9B8CFF", voiceId:"onwK4e9ZLuTAKqWW03F9",
    sys:"Tu es Maître Renaud, avocat spécialisé en droit de la santé et du travail. Tu conseilles Yohann Kha sur les ARS, conventions, contrats médecins, droit social, compérage, structures juridiques. Réponses précises, citant les principes applicables, orientées risque/action. Pas de jargon inutile." },
  { id:"vidal", name:"Dr Vidal", role:"Ophtalmologie & médecine", color:"#33d17a", voiceId:"onwK4e9ZLuTAKqWW03F9",
    sys:"Tu es le Dr Vidal, médecin ophtalmologue et conseiller médical multi-spécialités. Tu éclaires Yohann sur l'organisation des soins, le modèle 2 orthoptistes/ophtalmo, les flux patients, la qualité, le recrutement médical européen. Rigoureux, factuel, orienté efficacité opérationnelle." },
  { id:"sofia", name:"Sofia", role:"Marketing digital", color:"#FF6FB5", voiceId:"EXAVITQu4vr4xnSDxMaL",
    sys:"Tu es Sofia, Directrice Marketing Digital (Instagram, TikTok, LinkedIn, YouTube Shorts). Tu conçois des stratégies de contenu viral et de recrutement, des hooks, des calendriers éditoriaux, des tunnels. Concrète, orientée performance, ROI et viralité." },
  { id:"colonel", name:"Le Colonel", role:"Avocat du diable", color:"#E0A030", voiceId:"JBFqnCBsd6RMkjVDRZzb",
    sys:"Tu es Le Colonel, l'avocat du diable de la direction. Ton rôle : démonter les idées faibles, exposer les risques, les angles morts, les hypothèses non vérifiées. Tu es dur, exigeant, jamais complaisant. Tu pousses Yohann vers l'excellence en attaquant ses plans avant que le réel ne le fasse." },
  { id:"marcus", name:"Marcus", role:"Comptabilité & finance", color:"#5BD6A0", voiceId:"JBFqnCBsd6RMkjVDRZzb",
    sys:"Tu es Marcus, Directeur Financier. Tu maîtrises compta, trésorerie, EBITDA, valorisation, financement (Dailly, factoring), TVA, structures holding/SAS. Tu raisonnes en multiples de sortie et en valeur du groupe. Chiffré, rigoureux, sans complaisance." },
  { id:"luna", name:"Luna", role:"Coaching mental", color:"#C792EA", voiceId:"EXAVITQu4vr4xnSDxMaL",
    sys:"Tu es Luna, coach mental et psychologue. Tu aides Yohann à gérer la dispersion, l'hyperfocus, l'énergie, la prise de décision sous pression. Tu favorises la clarté et l'action saine, sans complaisance ni psychologisation excessive." },
  { id:"kenzo", name:"Kenzo", role:"CTO & tech", color:"#4FD8EB", voiceId:"JBFqnCBsd6RMkjVDRZzb",
    sys:"Tu es Kenzo, CTO. Tu maîtrises no-code/low-code, Make, automatisations IA, React, déploiement (Netlify), API, SaaS. Tu donnes des plans techniques concrets, étape par étape, orientés livrable et automatisation maximale." },
  { id:"bernard", name:"Bernard", role:"Immobilier santé", color:"#E0A030", voiceId:"JBFqnCBsd6RMkjVDRZzb",
    sys:"Tu es Bernard, expert immobilier santé. Baux commerciaux, négociation, scoring d'implantation, zones sous-dotées, ouverture de centres. Concret, orienté deal et rentabilité au m²." },
  { id:"yasmine", name:"Yasmine", role:"Import-export & douanes", color:"#FF9E64", voiceId:"EXAVITQu4vr4xnSDxMaL",
    sys:"Tu es Yasmine, spécialiste import-export et douanes, avec une expertise du commerce France-Colombie (sourcing, sunglasses, spiruline, logistique, paiements internationaux). Pratique, orientée flux et marges." },
  { id:"neo", name:"NEO", role:"Futurologue IA", color:"#7AA2F7", voiceId:"onwK4e9ZLuTAKqWW03F9",
    sys:"Tu es NEO, futurologue spécialisé IA et tendances tech. Tu détectes les signaux faibles, les opportunités de monétisation digitale et d'avantage concurrentiel à 1-5 ans. Visionnaire mais ancré dans l'actionnable." },
];

let current = null;
const convos = {}; // id -> [{role, content}]
AGENTS.forEach(a => convos[a.id] = []);

const listEl = document.getElementById('agentList');
AGENTS.forEach(a => {
  const d = document.createElement('div');
  d.className = 'agent'; d.id = 'ag-'+a.id;
  d.onclick = () => selectAgent(a.id);
  d.innerHTML = `<div class="av" style="background:${a.color}">${a.name[0]}</div>
    <div><div class="nm">${a.name}</div><div class="rl">${a.role}</div></div>`;
  listEl.appendChild(d);
});

function agentById(id){ return AGENTS.find(a=>a.id===id); }

function selectAgent(id){
  current = id;
  document.querySelectorAll('.agent').forEach(e=>e.classList.remove('active'));
  document.getElementById('ag-'+id).classList.add('active');
  document.getElementById('agents').classList.remove('open');
  render();
}

function render(){
  const feed = document.getElementById('feed');
  if(!current){ return; }
  const msgs = convos[current];
  if(msgs.length===0){
    const a = agentById(current);
    feed.innerHTML = `<div class="empty"><div class="core"></div><p><b style="color:${a.color}">${a.name}</b> — ${a.role}<br>Donne-lui une instruction.</p></div>`;
    return;
  }
  feed.innerHTML = '';
  msgs.forEach(m=>{
    const a = agentById(current);
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (m.role==='user'?'user':'ai');
    wrap.innerHTML = (m.role==='assistant'?`<div class="who" style="color:${a.color}">${a.name}</div>`:'') +
      `<div class="bubble">${escapeHtml(m.content)}</div>`;
    feed.appendChild(wrap);
  });
  feed.scrollTop = feed.scrollHeight;
}

function escapeHtml(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function send(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text) return;
  if(!current){ alert("Choisis d'abord un membre de l'équipe."); return; }
  input.value = '';
  const a = agentById(current);
  convos[current].push({role:'user', content:text});
  render();
  setStatus('TRAITEMENT…');
  document.getElementById('sendBtn').disabled = true;

  try{
    const res = await fetch('/api/claude', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({
        system: a.sys,
        messages: convos[current].map(m=>({role:m.role, content:m.content}))
      })
    });
    const data = await res.json();
    if(data.error){ throw new Error(data.error); }
    const reply = data.text || '(réponse vide)';
    convos[current].push({role:'assistant', content:reply});
    render();
    speak(reply, a.voiceId);
  }catch(e){
    convos[current].push({role:'assistant', content:'⚠ Erreur : '+e.message});
    render();
  }finally{
    setStatus('EN LIGNE');
    document.getElementById('sendBtn').disabled = false;
  }
}

function setStatus(t){ document.getElementById('statusTxt').textContent = t; }

// --- Voix ---
async function speak(text, voiceId){
  try{
    const res = await fetch('/api/tts', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ text: text.slice(0,800), voiceId })
    });
    if(!res.ok) throw new Error('tts-fallback');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    new Audio(url).play();
  }catch{
    // Fallback voix navigateur
    if('speechSynthesis' in window){
      const u = new SpeechSynthesisUtterance(text.slice(0,400));
      u.lang = 'fr-FR'; u.rate = 1.05;
      speechSynthesis.speak(u);
    }
  }
}

// --- Micro ---
let recog = null, recording = false;
function toggleMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert("La reconnaissance vocale n'est pas supportée par ce navigateur. Utilise Chrome ou Safari."); return; }
  if(recording){ recog.stop(); return; }
  recog = new SR();
  recog.lang = 'fr-FR'; recog.interimResults = true; recog.continuous = false;
  const btn = document.getElementById('micBtn');
  recog.onstart = ()=>{ recording=true; btn.classList.add('rec'); setStatus('ÉCOUTE…'); };
  recog.onresult = (e)=>{
    let t=''; for(const r of e.results) t+=r[0].transcript;
    document.getElementById('input').value = t;
  };
  recog.onerror = ()=>{ stopRec(btn); };
  recog.onend = ()=>{ stopRec(btn); };
  recog.start();
}
function stopRec(btn){ recording=false; btn.classList.remove('rec'); setStatus('EN LIGNE'); }

// auto-grow textarea
const ta = document.getElementById('input');
ta.addEventListener('input', ()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });

// sélectionne ARIA par défaut
selectAgent('aria');
</script>
</body>
</html>
